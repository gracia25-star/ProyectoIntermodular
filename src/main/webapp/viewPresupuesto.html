<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presupuestos - Edu-Gestión</title>
    <link rel="stylesheet" href="css/Registro.css">
    <link rel="stylesheet" href="css/Menu.css">
    <link rel="stylesheet" href="css/Gestion.css">
</head>

<body>

    <div class="divTitle">
        <img src="img/SalesianosBaner.jpg" alt="Logo">
        <div>
            <h1 class="main-title"> Presupuestos</h1>
        </div>
        <div class="user-menu">
            <div class="user-avatar">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" style="width: 22px; height: 22px;">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </div>
            <div class="user-dropdown">
                <div class="user-dropdown-header">
                    <div class="user-name">Usuario Gestor</div>
                    <div class="user-role">Administrador</div>
                </div>
                <a href="viewRegistro.html" class="logout-btn">
                    <span>Cerrar Sesión</span>
                </a>
            </div>
        </div>
    </div>

    <nav class="top-nav">
        <a href="viewMenu.html" class="top-nav-btn">Menu</a>
        <a href="viewDepartamentos.html" class="top-nav-btn">Departamentos</a>
        <a href="viewPresupuesto.html" class="top-nav-btn">Presupuestos</a>
        <a href="viewOrdenes.html" class="top-nav-btn">Órdenes de Compra</a>
        <a href="viewProveedores.html" class="top-nav-btn">Proveedores</a>
        <a href="viewProducto.html" class="top-nav-btn">Productos</a>
    </nav>

    <div class="menu-container">
        
        <div class="chart-card" style="margin-bottom: 2rem;">
            <h2 class="chart-title">Asignar Nuevo Presupuesto</h2>
            <div class="form-section" style="padding: 1.5rem;">
                <form action="#" method="POST">
                    <div class="row" style="display: flex; gap: 1rem;">
                        <div class="input-group" style="flex: 1;">
                            <label for="presupuesto-dep">Departamento</label>
                            <input type="text" id="presupuesto-dep" name="departamento" placeholder="Ej. Informática" required>
                        </div>
                        <div class="input-group" style="flex: 1;">
                            <label for="presupuesto-monto">Monto Total (€)</label>
                            <input type="number" id="presupuesto-monto" name="monto" placeholder="Ej. 15000" required>
                        </div>
                    </div>
                    <button type="submit" class="submit-btn" style="width: auto; padding: 10px 30px; margin-top: 1rem;">Guardar Presupuesto</button>
                </form>
            </div>
        </div>

        <div class="chart-card">
            <h2 class="chart-title">Presupuestos Actuales</h2>
            <div style="padding: 1.5rem; overflow-x: auto;">
                <table style="width: 100%; border-collapse: collapse; text-align: left;">
                    <thead style="border-bottom: 2px solid #eee;">
                        <tr>
                            <th style="padding: 10px;">ID</th>
                            <th style="padding: 10px;">Departamento</th>
                            <th style="padding: 10px;">Monto Asignado</th>
                            <th style="padding: 10px;">Estado</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr style="border-bottom: 1px solid #eee;">
                            <td style="padding: 10px;">PRE-001</td>
                            <td style="padding: 10px;">Informática</td>
                            <td style="padding: 10px;">15,000 €</td>
                            <td style="padding: 10px; color: green;">Aprobado</td>
                        </tr>
                        <tr style="border-bottom: 1px solid #eee;">
                            <td style="padding: 10px;">PRE-002</td>
                            <td style="padding: 10px;">Mantenimiento</td>
                            <td style="padding: 10px;">8,500 €</td>
                            <td style="padding: 10px; color: orange;">Pendiente</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script src="js/Menu.js"></script>
</body>

</html>
