<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presupuestos - Edu-Gestión</title>
    <link rel="icon" href="img/logo-salesianos2.png" type="image/png">
    <link rel="stylesheet" href="css/Registro.css">
    <link rel="stylesheet" href="css/Menu.css">
    <link rel="stylesheet" href="css/Presupuesto.css">
    <style>body{visibility:hidden}</style>
    <script>
        fetch('SesionServlet').then(r=>r.json()).then(d=>{
            if(d.role==='dept_manager') window.location.replace('viewMenu.html');
            else if(d.role==='accountant') window.location.replace('viewMenuAdmin.html');
            else document.body.style.visibility='visible';
        }).catch(()=>{document.body.style.visibility='visible'});
    </script>
</head>

<body>

    <!-- HEADER -->
    <div class="divTitle">
        <img src="img/SalesianosBaner.jpg" alt="Logo">
        <div>
            <h1 class="main-title">Presupuestos</h1>
        </div>
        <div class="user-menu">
            <div class="user-avatar">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </div>
            <div class="user-dropdown">
                <div class="user-dropdown-header">
                    <div class="user-name">Usuario Admin</div>
                    <div class="user-role">Administrador</div>
                </div>
                <a href="viewRegistro.html" class="logout-btn">Cerrar Sesión</a>
            </div>
        </div>
    </div>

    <!-- NAV (admin) -->
    <nav class="top-nav">
        <a href="viewMenuAdmin.html" class="top-nav-btn">Menú</a>
        <a href="viewPresupuesto.html" class="top-nav-btn">Presupuestos</a>
        <a href="viewOrdenesAdmin.html" class="top-nav-btn">Órdenes</a>
        <a href="viewProveedores.html" class="top-nav-btn">Proveedores</a>
        <a href="viewHistorico.html" class="top-nav-btn">Histórico</a>
    </nav>

    <div class="menu-container">

        <!-- ── ASIGNAR PRESUPUESTO ── -->
        <section class="chart-card orden-form-card">
            <h2 class="chart-title">Asignar Presupuesto — <span id="anio-pres"></span></h2>

            <div class="orden-form">
                <form id="form-presupuesto">
                    <div class="form-row">
                        <div class="input-group flex-2">
                            <label for="pres-departamento">Departamento</label>
                            <select id="pres-departamento" class="input-select" required>
                                <option value="" disabled selected>Selecciona un departamento…</option>
                            </select>
                        </div>
                        <div class="input-group flex-2">
                            <label for="pres-monto">Cantidad (€)</label>
                            <input type="number" id="pres-monto" min="0.01" step="0.01" placeholder="0,00" required>
                        </div>
                    </div>
                    <div class="form-row form-row-btn">
                        <button type="submit" class="submit-btn btn-auto">+ Guardar Presupuesto</button>
                    </div>
                </form>
            </div>

            <div class="table-container">
                <table class="data-table" id="tabla-presupuestos">
                    <colgroup>
                        <col style="width:45%">
                        <col style="width:15%">
                        <col style="width:25%">
                        <col style="width:15%">
                    </colgroup>
                    <thead>
                        <tr>
                            <th>Departamento</th>
                            <th>Año</th>
                            <th>Cantidad (€)</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tbody-presupuestos">
                        <tr><td colspan="4" class="tabla-vacia">Cargando…</td></tr>
                    </tbody>
                </table>
            </div>
        </section>

        <!-- ── ASIGNAR PLAN DE INVERSIÓN ── -->
        <section class="chart-card orden-form-card">
            <h2 class="chart-title">Asignar Plan de Inversión — <span id="anio-plan"></span></h2>

            <div class="orden-form">
                <form id="form-plan">
                    <div class="form-row">
                        <div class="input-group flex-2">
                            <label for="plan-departamento">Departamento</label>
                            <select id="plan-departamento" class="input-select" required>
                                <option value="" disabled selected>Selecciona un departamento…</option>
                            </select>
                        </div>
                        <div class="input-group flex-2">
                            <label for="plan-monto">Cantidad (€)</label>
                            <input type="number" id="plan-monto" min="0.01" step="0.01" placeholder="0,00" required>
                        </div>
                    </div>
                    <div class="form-row form-row-btn">
                        <button type="submit" class="submit-btn btn-auto">+ Guardar Plan</button>
                    </div>
                </form>
            </div>

            <div class="table-container">
                <table class="data-table" id="tabla-planes">
                    <colgroup>
                        <col style="width:45%">
                        <col style="width:15%">
                        <col style="width:25%">
                        <col style="width:15%">
                    </colgroup>
                    <thead>
                        <tr>
                            <th>Departamento</th>
                            <th>Año</th>
                            <th>Cantidad (€)</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tbody-planes">
                        <tr><td colspan="4" class="tabla-vacia">Cargando…</td></tr>
                    </tbody>
                </table>
            </div>
        </section>

    </div>

    <script src="js/Presupuesto.js"></script>

</body>
</html>
