<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Principal - Edu-Gestión</title>
    <link rel="icon" href="img/logo-salesianos2.png" type="image/png">
    <link rel="stylesheet" href="css/Registro.css">
    <link rel="stylesheet" href="css/Menu.css">
    <!-- Chart.js para las gráficas -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            visibility: hidden
        }
    </style>
    <script src="js/userInfo.js"></script>
    <script>
        fetch('SesionServlet').then(r => r.json()).then(d => {
            if (d.role === 'admin' || d.role === 'accountant') window.location.replace('viewMenuAdmin.html');
            else { initUserInfo(d); document.body.style.visibility = 'visible'; }
        }).catch(() => { document.body.style.visibility = 'visible' });
    </script>
</head>

<body>

    <!-- Banner superior igual que viewRegistro -->
    <div class="divTitle">
        <img src="img/SalesianosBaner.jpg" alt="Logo">
        <div>
            <h1 class="main-title">Edu-Gestión</h1>
        </div>
        <!-- Menú de usuario / Desloguear -->
        <div class="user-menu">
            <div class="user-avatar">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" style="width: 22px; height: 22px;">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </div>
            <div class="user-dropdown">
                <div class="user-dropdown-header">
                    <div class="user-name" id="user-name">Usuario</div>
                    <div class="user-role" id="user-role">Cargando...</div>
                </div>
                <a href="LogoutServlet" class="logout-btn">
                    <span>Cerrar Sesión</span>
                </a>
            </div>
        </div>
    </div>

    <nav class="top-nav">
        <a href="viewMenu.html" class="top-nav-btn">Menú</a>
        <a href="viewOrdenes.html" class="top-nav-btn">Órdenes de compra</a>
        <a href="viewProveedores.html" class="top-nav-btn">Proveedores</a>
        <a href="viewHistorico.html" class="top-nav-btn">Histórico</a>
        <a href="viewAdminUsuarios.html" class="top-nav-btn admin-only" style="display:none;">Registro de usuarios</a>
    </nav>

    <div class="menu-container">

        <!-- Sección de gráficas -->
        <section class="charts-section">
            <div class="chart-card">
                <h2 class="chart-title">Presupuestos Generales</h2>
                <div class="chart-wrapper">
                    <canvas id="chartPresupuestos"></canvas>
                </div>
            </div>
            <div class="chart-card">
                <h2 class="chart-title">Planes de Inversión</h2>
                <div class="chart-wrapper">
                    <canvas id="chartInversion"></canvas>
                </div>
            </div>
        </section>


    </div>

    <script src="js/Menu.js"></script>
</body>

</html>
